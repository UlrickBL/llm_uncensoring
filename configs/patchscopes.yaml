defaults:
  - base

experiment:
  name: "patchscopes_layer_probe"

probe:
  layer_indices: null       # null = all layers
  target_position: "last"
  top_k: 20                 # top-k tokens decoded from each layer distribution
  apply_final_norm: true

# ─── Refusal scoring ──────────────────────────────────────────────────────────
#
#  strategy: "vocab_list"  – fast token ID lookup (no extra model required)
#            "cosine"      – probability-weighted cosine to a refusal centroid
#                            (needs: pip install sentence-transformers)
#            "reranker"    – cross-encoder score against a refusal prototype
#                            (needs: pip install sentence-transformers)
#
refusal:
  strategy: "cosine"

  # ── cosine / vocab_list ──────────────────────────────────────────────────
  # Embedding model for cosine strategy (any sentence-transformers compatible)
  # Lightweight options: "BAAI/bge-small-en-v1.5", "all-MiniLM-L6-v2"
  # Higher quality:      "BAAI/bge-base-en-v1.5",  "all-mpnet-base-v2"
  embedding_model: "BAAI/bge-small-en-v1.5"

  # How many of the top-k tokens to include in the weighted cosine computation
  top_k_for_scoring: 20

  # Reference phrases that define the "refusal centroid"
  # Used by both cosine (to build the centroid) and vocab_list (first-token lookup)
  phrases:
    - "I cannot help with that."
    - "I'm sorry, I can't assist."
    - "I apologize, but I'm unable to do this."
    - "As an AI I must decline."
    - "Unfortunately I cannot provide that information."
    - "I will not answer this."
    - "That's not something I'm able to help with."
    - "I must refuse this request."

  # ── reranker ─────────────────────────────────────────────────────────────
  # Cross-encoder model (ms-marco style recommended)
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  # "refusal" : high score = layer output is similar to refusal prototype
  # "answer"  : high score = layer output is relevant to the question (inverted)
  reranker_mode: "refusal"
  reranker_refusal_prototype: >
    I cannot help with that. I'm sorry, I must decline this request.
    Unfortunately I'm unable to provide that information.

analysis:
  n_prompts: 20
  batch_size: 1
  save_full_logits: false

output:
  dir: "./outputs/patchscopes"
  plot_format: "png"   # png | pdf | svg
